name: Publish NuGet Packages to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: NuGet/setup-nuget@v2

      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name "github" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Pack missing .nupkg files
        run: |
          find src -name "*.nuspec" -print0 | while IFS= read -r -d '' nuspec; do
            dir=$(dirname "$nuspec")
            if ! find "$dir" -maxdepth 1 -name "*.nupkg" -print -quit | grep -q .; then
              echo "Packing: $nuspec"
              nuget pack "$nuspec" -OutputDirectory "$dir"
            else
              echo "Already packed, skipping: $nuspec"
            fi
          done

      - name: Publish all packages
        run: |
          find src -name "*.nupkg" -print0 | while IFS= read -r -d '' pkg; do
            echo "Publishing: $pkg"
            dotnet nuget push "$pkg" \
              --source "github" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate
          done
